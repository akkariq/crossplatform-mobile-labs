<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Агрегатор Новостей</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1976d2">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>📰 PWA News</h1>
            <div class="header-actions">
                <button id="push-btn" class="btn">Включить уведомления</button>
                <div id="offline-badge" class="badge offline" style="display: none;">Офлайн-режим</div>
            </div>
        </div>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="search-input" placeholder="Поиск новостей...">
            <input type="date" id="archive-date">
            <button id="search-btn" class="btn-search">Найти</button>
        </section>

        <nav id="categories-nav" class="categories-bar">
            </nav>

        <section id="news-container" class="news-grid">
            <div class="loader">Загрузка новостей...</div>
        </section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
